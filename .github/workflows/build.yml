name: build-and-validate

on:
  push:
    branches: [main]
    paths:
      - 'categories/**'
      - 'build.py'
      - 'schema.js'
      - '.github/workflows/build.yml'
  pull_request:
    paths:
      - 'categories/**'
      - 'build.py'
      - 'schema.js'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Build database.js (strict — warnings = errors)
        env:
          PSYCH_RENDERER_DIR: ${{ github.workspace }}/docs
        run: |
          python3 build.py --strict

      - name: Validate flowchart graphs
        run: |
          python3 - <<'PY'
          import json, sys, glob
          errors = 0
          for path in glob.glob('categories/*.json'):
              with open(path) as f:
                  entries = json.load(f)
              for e in entries:
                  if e.get('type') != 'flowchart':
                      continue
                  fid = e['id']
                  fc = e['flowchart']
                  steps = fc['steps']
                  if fc['start'] not in steps:
                      print(f'ERROR [{fid}] start "{fc["start"]}" not in steps')
                      errors += 1
                  for sname, sdef in steps.items():
                      for opt in sdef.get('options', []):
                          if opt.get('next') not in steps:
                              print(f'ERROR [{fid}] step {sname}: next "{opt.get("next")}" missing')
                              errors += 1
                      if sdef.get('result') is True:
                          if not sdef.get('content'):
                              print(f'ERROR [{fid}] result {sname} has no content')
                              errors += 1
                          if not sdef.get('title'):
                              print(f'ERROR [{fid}] result {sname} has no title')
                              errors += 1
          if errors:
              print(f'\nTotal: {errors} flowchart-graph errors')
              sys.exit(1)
          print('Flowchart graphs OK')
          PY

      - name: Verify docs/database.js is up-to-date with source
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          if [[ -n $(git status --porcelain docs/database.js) ]]; then
            echo "::warning::docs/database.js drifted from source — author should run build.py locally and commit before next push"
            git diff --stat docs/database.js
          else
            echo "docs/database.js is in sync with source"
          fi
        # NOTE: workflow does NOT auto-commit (branch protection blocks bot push).
        # Workflow: edit categories/, run python3 build.py locally (updates both
        # docs/ and Инструменты_HTML/), commit + push.
